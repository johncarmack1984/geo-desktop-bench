name: ci

# PR gate: typecheck the CDK infra and build the report site, so a change that
# breaks either can't merge (merging main rebuilds + redeploys the site). Holds
# no AWS creds and does not deploy — deploy stays in deploy.yml.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: geobench-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10 # matches deploy.yml (no root packageManager pin)
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - run: pnpm -C infra install --frozen-lockfile
      - run: pnpm -C infra run typecheck
      - run: pnpm -C site build
