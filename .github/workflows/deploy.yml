name: deploy

# Continuous deployment: a push to main that changes deployable content builds the
# report + live demos and runs `cdk deploy`, which uploads site/dist and invalidates
# CloudFront. Workflow- and docs-only pushes (e.g. Dependabot action bumps) are skipped
# via paths-ignore — trigger the manual "Run workflow" (workflow_dispatch) to force a
# deploy. Auth is GitHub OIDC — no long-lived AWS keys. The job self-skips until the
# deploy role is wired up (repo variable AWS_DEPLOY_ROLE_ARN), so a fresh clone's main
# stays green. See infra/DEPLOY.md.
on:
  push:
    branches: [main]
    # A pure workflow/docs change (Dependabot bumps, README edits) must not redeploy the
    # live site; anything under a deployable path still does. Force via workflow_dispatch.
    paths-ignore:
      - '.github/**'
      - '**/*.md'
      - '.gitignore'
      - '**/.gitignore'
  workflow_dispatch:

permissions:
  id-token: write # mint the OIDC token assumed by AWS
  contents: read
  deployments: write # record the deployment against the commit

# Never run two deploys at once; let an in-flight cdk deploy finish.
concurrency:
  group: geobench-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Only when the deploy role is configured (skipped, not failed, otherwise).
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10 # no root package.json#packageManager here, so pin explicitly
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'

      # The ~6 MB Firenze basemap is kept out of git; fetch it so it lands in site/dist.
      - name: Fetch sample data
        run: sh scripts/fetch-sample-data.sh

      - name: Install
        run: |
          pnpm -C geo-render-bench install --frozen-lockfile
          pnpm -C web-capstone install --frozen-lockfile
          pnpm -C infra install --frozen-lockfile

      - name: Build site (report + live demos)
        run: pnpm -C site build

      - name: Deploy (cdk → S3 + CloudFront invalidation)
        run: pnpm -C infra run deploy

      - name: Health check
        run: |
          set -euo pipefail
          # A few retries separate "the deploy broke the site" from CloudFront
          # settling; both end states stay loud.
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 https://geobench.johncarmack.com/) \
              && [ "$code" = "200" ] && { echo "healthy: geobench.johncarmack.com -> $code"; exit 0; }
            echo "attempt $i: geobench.johncarmack.com -> ${code:-error}; retrying"
            sleep 10
          done
          echo "::error::health check failed for https://geobench.johncarmack.com/"
          exit 1

      - name: Record the deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dep_id=$(gh api "repos/$GITHUB_REPOSITORY/deployments" --input - <<JSON | jq -r '.id'
          {"ref":"$GITHUB_SHA","environment":"production","auto_merge":false,"required_contexts":[],"description":"cdk deploy: bench site"}
          JSON
          )
          gh api "repos/$GITHUB_REPOSITORY/deployments/$dep_id/statuses" \
            -f state=success \
            -f log_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            -f environment_url="https://geobench.johncarmack.com/" >/dev/null
          echo "recorded deployment $dep_id (environment production)"
